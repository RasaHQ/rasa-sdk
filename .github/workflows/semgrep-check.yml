# =============================================================================
#   🔍 Semgrep Static Analysis Workflow
# -----------------------------------------------------------------------------
# Runs Semgrep static analysis on this repository:
#   - On every push to `main`, scanning the full codebase.
#   - On every pull request, using diff-aware scanning of changed files.
#
# The actual scan logic (including runner hardening) lives in the shared
# reusable workflow:
#   RasaHQ/infrasec-workflows/.github/workflows/scan-semgrep.yml
# =============================================================================

name: Semgrep

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Run Semgrep via the shared reusable workflow.
  # ---------------------------------------------------------------------------
  semgrep:
    uses: RasaHQ/infrasec-workflows/.github/workflows/scan-semgrep.yml@ac352f981b41808f833b7cdad8445bb3c34b8c64
